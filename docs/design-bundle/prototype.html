<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>오늘 저녁은 치킨이닭! — 시안 프로토타입</title>

<!-- Fonts: Pretendard (Korean body), JetBrains Mono (dogtag/price), Black Ops One (stencil) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Black+Ops+One&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN TOKENS — 디자인 시스템 (DESIGN.md §3-§9 충실 매핑)
   ============================================================ */
:root {
  /* ── COLOR / 라이트 default (축제 부스 환경) ────────────── */
  --color-bg:        #F5EFE0;
  --color-surface:   #EAE3D0;
  --color-elevated:  #DFD7BE;
  --color-ink:       #2A2C20;
  --color-muted:     #6B6B5C;
  --color-divider:   #C8C0A8;

  --color-accent:        #F4D200;
  --color-accent-pressed:#D9BB00;
  --color-accent-soft:   rgba(244, 210, 0, 0.20);

  --camo-olive: #5C5D3A;
  --camo-sand:  #9A8E6B;
  --camo-earth: #4F3D2A;
  --camo-leaf:  #6E7544;

  --color-success: #5A8C42;
  --color-warning: #E59B0C;
  --color-danger:  #C73E1D;
  --color-info:    #3A6B7E;

  --stamp-red:   #B5301A;
  --stamp-black: #1F1B14;
  --stamp-green: #4A6B2D;

  /* ── TYPOGRAPHY ──────────────────────────────────────── */
  --font-body:   'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-display:'Pretendard Variable', Pretendard, sans-serif;
  --font-mono:   'JetBrains Mono', 'D2Coding', 'Courier New', monospace;
  --font-stencil:'Black Ops One', 'Pretendard Variable', sans-serif;

  --text-3xs: 10px;
  --text-2xs: 12px;
  --text-xs:  14px;
  --text-sm:  16px;
  --text-base:18px;
  --text-lg:  20px;
  --text-xl:  24px;
  --text-2xl: 32px;
  --text-3xl: 48px;
  --text-4xl: 64px;

  --weight-normal:400; --weight-medium:500; --weight-semibold:600;
  --weight-bold:700;   --weight-black:900;

  /* ── SPACING (4px base) ──────────────────────────────── */
  --space-3xs:2px;  --space-2xs:4px; --space-xs:8px;
  --space-sm:12px;  --space-md:16px; --space-lg:24px;
  --space-xl:32px;  --space-2xl:48px;--space-3xl:64px;

  /* ── RADIUS ─────────────────────────────────────────── */
  --radius-none:0; --radius-xs:2px; --radius-sm:4px;
  --radius-md:8px; --radius-lg:12px;
  --radius-pill:9999px;

  /* ── SHADOW (hard-offset, 도장 톤) ──────────────────── */
  --shadow-card:    2px 2px 0 rgba(31,27,20,0.18), 0 1px 2px rgba(0,0,0,0.05);
  --shadow-elevated:4px 4px 0 rgba(31,27,20,0.25), 0 4px 12px rgba(0,0,0,0.15);
  --shadow-stamp:   2px 2px 0 rgba(0,0,0,0.4);
  --shadow-tag:     0 6px 0 -2px rgba(0,0,0,0.3), 0 8px 18px rgba(0,0,0,0.22);
  --shadow-sticker: 1px 1px 0 rgba(0,0,0,0.5);
  --shadow-cta:     3px 3px 0 var(--color-ink);

  /* ── MOTION ─────────────────────────────────────────── */
  --duration-tap:100ms; --duration-card:200ms; --duration-stamp:150ms;
  --duration-tag:600ms; --duration-mascot:400ms;
  --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
  --ease-stamp: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-tag:   cubic-bezier(0.17, 0.67, 0.32, 1.5);
}

/* ── 다크 보조 모드 (prefers-color-scheme 따라) ─────── */
@media (prefers-color-scheme: dark) {
  :root.respect-dark {
    --color-bg:#1A1A14; --color-surface:#25241A; --color-elevated:#2F2E22;
    --color-ink:#F5EFE0; --color-muted:#A8A493; --color-divider:#3A3829;
  }
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: #1F1B14; /* canvas around the device frame */
  color: var(--color-ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  font-feature-settings: "ss01", "tnum";
}

/* tabular nums helper for prices/dogtag */
.tabular { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================================
   STAGE (the canvas around the device + admin panels)
   ============================================================ */
.stage {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 96px;
  background:
    /* digital camo, 5% opacity */
    repeating-linear-gradient(0deg,
      rgba(92,93,58,0.06) 0 10px, transparent 10px 20px),
    repeating-linear-gradient(90deg,
      rgba(79,61,42,0.05) 0 10px, transparent 10px 20px),
    #1F1B14;
}
.stage-header {
  width: 100%; max-width: 1280px;
  display: flex; align-items: center; justify-content: space-between;
  color: #DFD7BE;
  font-family: var(--font-stencil);
  letter-spacing: 0.08em;
  padding: 0 4px 16px;
  font-size: 13px;
}
.stage-header .crumb {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #9A8E6B;
}
.stage-header .crumb b { color: var(--color-accent); font-weight: 700; }
.stage-modes {
  display: flex; gap: 4px;
  background: rgba(0,0,0,0.35);
  padding: 4px;
  border: 1px solid rgba(244,210,0,0.25);
  border-radius: 4px;
}
.stage-modes button {
  background: transparent;
  border: none;
  color: #9A8E6B;
  font-family: var(--font-stencil);
  letter-spacing: 0.1em;
  font-size: 11px;
  padding: 6px 12px;
  cursor: pointer;
  border-radius: 2px;
}
.stage-modes button.active {
  background: var(--color-accent);
  color: var(--color-ink);
}

/* ============================================================
   PHONE FRAME (mobile browser — not an app; subtle browser chrome)
   ============================================================ */
.phone {
  width: 390px;
  height: 800px;
  background: var(--color-bg);
  border-radius: 36px;
  box-shadow:
    0 0 0 10px #2A2C20,
    0 0 0 12px #3A3829,
    0 30px 60px rgba(0,0,0,0.5);
  overflow: hidden;
  position: relative;
  display: flex; flex-direction: column;
}
.phone-statusbar {
  height: 36px;
  background: var(--color-bg);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  color: var(--color-ink);
  flex: 0 0 36px;
}
.phone-statusbar .right { display: flex; gap: 6px; align-items: center; font-size: 11px; }
.phone-browserbar {
  height: 32px;
  background: var(--color-elevated);
  border-bottom: 1px solid var(--color-divider);
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-muted);
  flex: 0 0 32px;
}
.phone-browserbar .url {
  flex: 1; background: var(--color-bg);
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--color-divider);
  color: var(--color-ink);
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.phone-browserbar .lock { color: var(--color-success); }
.phone-screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  -webkit-overflow-scrolling: touch;
  background: var(--color-bg);
}
.phone-screen::-webkit-scrollbar { width: 4px; }
.phone-screen::-webkit-scrollbar-thumb { background: var(--color-divider); border-radius: 2px; }

/* ============================================================
   ADMIN FRAME (PC) — laptop-ish chrome
   ============================================================ */
.admin-frame {
  width: 100%;
  max-width: 1200px;
  background: var(--color-bg);
  border-radius: 12px;
  box-shadow:
    0 0 0 1px var(--color-divider),
    0 0 0 8px #2A2C20,
    0 30px 60px rgba(0,0,0,0.5);
  overflow: hidden;
  min-height: 720px;
  display: flex; flex-direction: column;
}
.admin-chrome {
  background: #2A2C20;
  height: 28px;
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 6px;
}
.admin-chrome .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #6B6B5C;
}
.admin-chrome .dot.r { background: #C73E1D; }
.admin-chrome .dot.y { background: #E59B0C; }
.admin-chrome .dot.g { background: #5A8C42; }
.admin-chrome .label {
  margin-left: auto; margin-right: auto;
  font-family: var(--font-mono);
  color: #9A8E6B;
  font-size: 11px;
}

/* ============================================================
   COMMON UI
   ============================================================ */

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  font-family: var(--font-body);
  font-weight: var(--weight-bold);
  border: 2px solid var(--color-ink);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: transform var(--duration-tap) var(--ease-out),
              box-shadow var(--duration-tap) var(--ease-out),
              background var(--duration-tap) var(--ease-out);
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
}
.btn:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
}
.btn:active { transform: translate(2px, 2px); box-shadow: none; }
.btn:disabled, .btn[aria-disabled="true"] {
  opacity: 0.45; cursor: not-allowed; box-shadow: none;
}
.btn-primary {
  background: var(--color-accent);
  color: var(--color-ink);
  box-shadow: var(--shadow-cta);
}
.btn-primary:hover:not(:disabled) { background: var(--color-accent-pressed); }
.btn-secondary {
  background: var(--color-bg);
  color: var(--color-ink);
  box-shadow: 2px 2px 0 var(--color-ink);
}
.btn-secondary:hover { background: var(--color-elevated); }
.btn-danger {
  background: var(--color-danger);
  color: white;
  box-shadow: 2px 2px 0 var(--color-ink);
}
.btn-ghost {
  background: transparent;
  border-color: transparent;
  box-shadow: none;
  color: var(--color-ink);
}
.btn-ghost:hover { background: var(--color-elevated); }

.btn-lg { height: 56px; padding: 0 20px; font-size: 18px; }
.btn-md { height: 44px; padding: 0 16px; font-size: 16px; }
.btn-sm { height: 36px; padding: 0 12px; font-size: 14px; }
.btn-xs { height: 28px; padding: 0 10px; font-size: 13px; border-width: 1.5px; box-shadow: 1.5px 1.5px 0 var(--color-ink); }
.btn-block { width: 100%; }

/* INPUTS */
.fld { display: flex; flex-direction: column; gap: 6px; }
.fld-label {
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--color-ink);
  letter-spacing: 0.01em;
}
.fld-label .req { color: var(--color-danger); margin-left: 2px; }
.fld-hint { font-size: var(--text-2xs); color: var(--color-muted); font-family: var(--font-mono); }
.fld-error { font-size: var(--text-xs); color: var(--color-danger); font-weight: 600; }
.input, .select {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  background: white;
  color: var(--color-ink);
  border: 2px solid var(--color-divider);
  border-radius: var(--radius-md);
  height: 52px;
  padding: 0 14px;
  width: 100%;
  transition: border-color 120ms;
}
.input.mono { font-family: var(--font-mono); letter-spacing: 0.04em; font-size: 17px; }
.input:focus, .select:focus {
  outline: none;
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px var(--color-accent-soft);
}
.input.is-error, .select.is-error {
  border-color: var(--color-danger);
  background: #FBECE7;
}

/* CHECKBOX (학번 없음 = 외곽선 형광 옐로, 채움 X) */
.checkbox {
  display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer;
  padding: 12px;
  border: 2px solid var(--color-accent);
  background: transparent;
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  min-height: 48px;
  user-select: none;
}
.checkbox.is-checked { background: var(--color-accent-soft); }
.checkbox input { display: none; }
.checkbox .box {
  width: 22px; height: 22px;
  border: 2px solid var(--color-ink);
  border-radius: 4px;
  background: white;
  flex: 0 0 22px;
  position: relative;
  margin-top: 1px;
}
.checkbox.is-checked .box { background: var(--color-accent); }
.checkbox.is-checked .box::after {
  content: ""; position: absolute;
  left: 5px; top: 1px;
  width: 7px; height: 12px;
  border: solid var(--color-ink);
  border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
}
.checkbox .meta {
  display: flex; flex-direction: column; gap: 2px;
}
.checkbox .meta .sub {
  font-weight: 400;
  font-size: var(--text-xs);
  color: var(--color-muted);
}

/* RADIO */
.radio-group { display: flex; gap: 8px; }
.radio {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 14px;
  border: 2px solid var(--color-divider);
  border-radius: var(--radius-md);
  background: white;
  cursor: pointer;
  font-weight: var(--weight-semibold);
  font-size: var(--text-sm);
  min-height: 56px;
}
.radio.is-checked {
  border-color: var(--color-ink);
  background: var(--color-accent-soft);
  box-shadow: 2px 2px 0 var(--color-ink);
}
.radio input { display: none; }

/* DIVIDER */
.divider { height: 1px; background: var(--color-divider); margin: 16px 0; }
.divider-dashed { border-top: 1px dashed var(--color-divider); height: 0; margin: 12px 0; }
.divider-stamp { border-top: 2px solid var(--color-ink); margin: 12px 0; }

/* CARD */
.card {
  background: var(--color-surface);
  border: 1.5px solid var(--color-divider);
  border-radius: var(--radius-md);
  padding: 16px;
}

/* STATUS CHIP */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  height: 24px;
  padding: 0 10px;
  border-radius: var(--radius-pill);
  font-size: var(--text-2xs);
  font-weight: var(--weight-bold);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.chip-ordered  { background: var(--color-elevated); color: var(--color-ink); }
.chip-transfer { background: rgba(229,155,12,0.18); color: #8C5F00; }
.chip-paid     { background: rgba(90,140,66,0.18); color: var(--color-success); }
.chip-cooking  { background: var(--color-accent-soft); color: var(--color-ink); }
.chip-ready    { background: var(--color-accent); color: var(--color-ink); }
.chip-done     { background: var(--color-success); color: white; }
.chip-canceled { background: rgba(199,62,29,0.15); color: var(--color-danger); }
.chip-hold     { background: rgba(229,155,12,0.18); color: #8C5F00; }

/* COUNT BADGE */
.count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 24px; height: 22px;
  padding: 0 7px;
  border-radius: var(--radius-pill);
  background: var(--color-ink);
  color: var(--color-accent);
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 12px;
}
.count-badge.warn { background: var(--color-warning); color: var(--color-ink); }
.count-badge.danger { background: var(--color-danger); color: white; }

/* SPINNER */
.spinner {
  width: 24px; height: 24px;
  border: 3px solid var(--color-divider);
  border-top-color: var(--color-accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: inline-block;
}
.spinner.sm { width: 16px; height: 16px; border-width: 2px; }
.spinner.lg { width: 48px; height: 48px; border-width: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STAMP BADGE (real ink-stamp feel) */
.stamp {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-stencil);
  letter-spacing: 0.06em;
  border: 2.5px solid currentColor;
  padding: 4px 12px;
  font-size: 14px;
  text-transform: uppercase;
  background: transparent;
  position: relative;
  filter: url(#stamp-rough);
}
.stamp.stamp-recommended { color: var(--stamp-black); transform: rotate(-4deg); }
.stamp.stamp-sold-out    { color: var(--stamp-red); transform: rotate(-2deg); font-size: 18px; padding: 6px 14px; }
.stamp.stamp-paid        { color: var(--stamp-red); transform: rotate(3deg); }
.stamp.stamp-done        { color: var(--stamp-black); transform: rotate(-3deg); }
.stamp.stamp-canceled    { color: var(--stamp-red); transform: rotate(-2deg); }

/* DOGTAG */
.dogtag {
  display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--color-accent);
  border: 3px solid var(--color-ink);
  border-radius: 12px 12px 6px 6px;
  padding: 14px 32px 16px;
  position: relative;
  box-shadow: var(--shadow-tag);
  color: var(--color-ink);
  text-align: center;
}
.dogtag::before {
  content: "";
  position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px;
  background: var(--color-ink);
  border-radius: 50%;
}
.dogtag::after {
  content: "";
  position: absolute;
  top: -22px; left: 50%; transform: translateX(-50%);
  width: 2px; height: 14px;
  background: var(--color-ink);
}
.dogtag .num {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 48px;
  line-height: 1;
  letter-spacing: 0.02em;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
}
.dogtag .meta {
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--color-ink);
  opacity: 0.7;
}
.dogtag.sm { padding: 8px 18px; }
.dogtag.sm .num { font-size: 28px; }
.dogtag.sm .meta { font-size: 9px; margin-top: 3px; }
.dogtag.xs { padding: 4px 10px; border-radius: 6px 6px 3px 3px; }
.dogtag.xs::before, .dogtag.xs::after { display: none; }
.dogtag.xs .num { font-size: 18px; }
.dogtag.xs .meta { display: none; }

@keyframes dogtag-drop {
  0%   { transform: translateY(-40px) rotate(-6deg); opacity: 0; }
  60%  { transform: translateY(0) rotate(2deg); opacity: 1; }
  80%  { transform: translateY(0) rotate(-1deg); }
  100% { transform: translateY(0) rotate(0deg); opacity: 1; }
}
.dogtag.dropping { animation: dogtag-drop 600ms var(--ease-tag) both; }

@keyframes stamp-in {
  0%   { transform: scale(1.4) rotate(var(--rot, 0deg)); opacity: 0; }
  100% { transform: scale(1) rotate(var(--rot, 0deg)); opacity: 1; }
}
.stamp.stamping { animation: stamp-in 150ms var(--ease-stamp) both; }

/* MENU FALLBACK */
.menu-fallback {
  width: 100%; aspect-ratio: 4/3;
  background:
    repeating-linear-gradient(45deg,
      rgba(31,27,20,0.05) 0 8px, transparent 8px 16px),
    var(--cat-color, var(--color-elevated));
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 6px;
  color: var(--color-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.menu-fallback .emoji {
  font-size: 42px;
  filter: saturate(0.7);
  opacity: 0.85;
}
.menu-fallback .label { opacity: 0.6; }

/* MASCOT placeholder (stencil military helmet bear icon) */
.mascot {
  width: var(--mascot-size, 80px);
  height: var(--mascot-size, 80px);
  display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column;
}

/* SCREEN BASE */
.screen { padding: 16px; }
.screen-pad-lg { padding: 16px 16px 100px; } /* leaves room for sticky bottom CTA */

/* TOPBAR (mobile) */
.topbar {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-divider);
  gap: 12px;
}
.topbar .brand {
  display: flex; align-items: center; gap: 8px;
}
.topbar .brand .logo {
  width: 32px; height: 32px;
  background: var(--color-ink);
  color: var(--color-accent);
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-stencil);
  font-size: 12px;
}
.topbar .brand .title {
  font-weight: 800;
  font-size: 14px;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.topbar .brand .sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--color-muted);
  letter-spacing: 0.05em;
}
.topbar .back {
  background: none; border: none; padding: 6px;
  cursor: pointer;
  display: inline-flex; align-items: center;
  font-size: 22px;
  color: var(--color-ink);
}

/* STICKY BOTTOM CTA */
.bottom-bar {
  position: sticky; bottom: 0;
  background: var(--color-bg);
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--color-divider);
  display: flex; flex-direction: column; gap: 8px;
  z-index: 10;
}

/* PROGRESS bar (cooking timeline) */
.timeline {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  position: relative;
  padding: 0 4px;
}
.timeline .node {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  position: relative;
  z-index: 1;
}
.timeline .dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--color-elevated);
  border: 2px solid var(--color-divider);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--color-muted);
}
.timeline .label {
  font-size: 11px; font-weight: 600;
  color: var(--color-muted);
  text-align: center;
  font-family: var(--font-body);
}
.timeline .node.done .dot {
  background: var(--color-accent);
  border-color: var(--color-ink);
  color: var(--color-ink);
}
.timeline .node.done .label { color: var(--color-ink); }
.timeline .node.current .dot {
  background: var(--color-accent);
  border-color: var(--color-ink);
  color: var(--color-ink);
  box-shadow: 0 0 0 4px var(--color-accent-soft);
  animation: pulse 1.6s ease-in-out infinite;
}
.timeline .node.current .label {
  color: var(--color-ink);
  font-weight: 800;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0px var(--color-accent-soft); }
  50%      { box-shadow: 0 0 0 8px var(--color-accent-soft); }
}
.timeline::before {
  content: "";
  position: absolute;
  top: 13px; left: 14%; right: 14%;
  height: 2px;
  background: var(--color-divider);
  z-index: 0;
}
.timeline .fill {
  position: absolute;
  top: 13px; left: 14%;
  height: 2px;
  background: var(--color-ink);
  z-index: 0;
  transition: width 800ms var(--ease-out);
}

/* ADMIN LAYOUT */
.admin-topnav {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 16px;
  background: var(--color-surface);
  border-bottom: 2px solid var(--color-ink);
}
.admin-topnav .brand {
  font-family: var(--font-stencil);
  letter-spacing: 0.06em;
  font-size: 14px;
  padding: 4px 10px;
  background: var(--color-ink);
  color: var(--color-accent);
  border-radius: 4px;
  margin-right: 12px;
}
.admin-topnav .nav-link {
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  border: none;
  font-family: var(--font-body);
  color: var(--color-muted);
}
.admin-topnav .nav-link.active {
  background: var(--color-ink);
  color: var(--color-accent);
}
.admin-topnav .right {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--color-muted);
}
.admin-topnav .right .live { color: var(--color-success); font-weight: 700; }

.admin-body {
  display: grid;
  grid-template-columns: 200px 1fr;
  flex: 1;
  min-height: 0;
}
.admin-side {
  background: var(--color-elevated);
  border-right: 1px solid var(--color-divider);
  padding: 12px;
  font-size: 13px;
}
.admin-side h4 {
  margin: 0 0 8px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-muted);
  font-weight: 700;
}
.admin-side ul { list-style: none; padding: 0; margin: 0 0 16px; }
.admin-side .row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.admin-side .row.alert { background: rgba(199,62,29,0.12); color: var(--color-danger); }
.admin-side .row.warn  { background: rgba(229,155,12,0.18); color: #8C5F00; }
.admin-content {
  padding: 16px 20px;
  overflow: auto;
}

/* dashboard columns */
.kanban {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
  align-items: start;
}
.kanban-col {
  background: var(--color-surface);
  border: 1.5px solid var(--color-divider);
  border-radius: var(--radius-md);
  min-height: 480px;
  display: flex; flex-direction: column;
}
.kanban-col-header {
  padding: 10px 12px;
  border-bottom: 1.5px solid var(--color-divider);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.02em;
}
.kanban-col-header.urgent {
  background: rgba(199,62,29,0.12);
  border-bottom-color: var(--color-danger);
  color: var(--color-danger);
}
.kanban-col-header.warn {
  background: rgba(229,155,12,0.15);
  border-bottom-color: var(--color-warning);
  color: #8C5F00;
}
.kanban-col-body {
  padding: 8px; display: flex; flex-direction: column; gap: 8px;
}
.kanban-card {
  background: white;
  border: 1.5px solid var(--color-divider);
  border-radius: 6px;
  padding: 8px;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 1px 1px 0 rgba(0,0,0,0.08);
}
.kanban-card:hover { border-color: var(--color-ink); }
.kanban-card .head {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.kanban-card .ordno {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 14px;
}
.kanban-card .age {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--color-muted);
}
.kanban-card .age.warn  { color: var(--color-warning); font-weight: 700; }
.kanban-card .age.danger { color: var(--color-danger);  font-weight: 800; }
.kanban-card .who { font-weight: 600; }
.kanban-card .meta {
  font-size: 11px; color: var(--color-muted);
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 2px;
}
.kanban-card .meta .price { font-family: var(--font-mono); color: var(--color-ink); font-weight: 700; }
.kanban-card .actions {
  margin-top: 6px;
  display: flex; gap: 4px;
}
.kanban-empty {
  padding: 24px 12px;
  text-align: center;
  color: var(--color-muted);
  font-size: 12px;
}

/* PIN pad */
.pin-display {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: 24px;
}
.pin-cell {
  width: 56px; height: 64px;
  border: 2px solid var(--color-divider);
  border-radius: var(--radius-md);
  background: white;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 800;
}
.pin-cell.filled { border-color: var(--color-ink); }
.pin-cell.error  { border-color: var(--color-danger); background: #FBECE7; animation: shake 300ms; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  max-width: 320px;
  margin: 0 auto;
}
.pin-key {
  height: 56px;
  font-size: 22px;
  font-family: var(--font-mono);
  font-weight: 700;
  background: var(--color-surface);
  border: 2px solid var(--color-divider);
  border-radius: var(--radius-md);
  cursor: pointer;
}
.pin-key:active { background: var(--color-elevated); transform: translate(1px,1px); }

/* WINNER WINNER text */
.winner {
  font-family: var(--font-stencil);
  font-size: 38px;
  line-height: 1;
  letter-spacing: 0.02em;
  color: var(--color-ink);
  text-align: center;
  text-shadow: 2px 2px 0 var(--color-accent);
  margin: 0;
}

/* utility */
.row { display: flex; align-items: center; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.col { display: flex; flex-direction: column; }
.gap-2  { gap: 8px; }
.gap-3  { gap: 12px; }
.gap-4  { gap: 16px; }
.gap-6  { gap: 24px; }
.mt-2   { margin-top: 8px; }
.mt-3   { margin-top: 12px; }
.mt-4   { margin-top: 16px; }
.mt-6   { margin-top: 24px; }
.mb-2   { margin-bottom: 8px; }
.mb-4   { margin-bottom: 16px; }

.muted { color: var(--color-muted); }
.danger-text { color: var(--color-danger); }
.success-text { color: var(--color-success); }
.warning-text { color: var(--color-warning); }
.center { text-align: center; }
.bold { font-weight: 700; }
.h1 { font-size: 24px; font-weight: 800; margin: 0 0 4px; letter-spacing: -0.01em; }
.h2 { font-size: 20px; font-weight: 700; margin: 0 0 4px; }
.h3 { font-size: 16px; font-weight: 700; margin: 0; }
.section-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-muted);
  margin-bottom: 6px;
  font-family: var(--font-mono);
}

/* mascot caption */
.mascot-caption {
  font-family: var(--font-stencil);
  letter-spacing: 0.06em;
  font-size: 13px;
  text-align: center;
  color: var(--color-ink);
}

/* Account info card */
.account-card {
  background: var(--color-ink);
  color: var(--color-bg);
  border-radius: var(--radius-md);
  padding: 14px 16px;
}
.account-card .bank-row {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.account-card .acct-num { color: var(--color-accent); }
.account-card .copy-btn {
  margin-left: auto;
  height: 32px; padding: 0 10px;
  background: var(--color-accent);
  color: var(--color-ink);
  border: none;
  border-radius: 4px;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
}
.account-card .row2 {
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  opacity: 0.75;
}

.warn-banner {
  background: rgba(229,155,12,0.18);
  border: 1.5px dashed var(--color-warning);
  color: #8C5F00;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}

/* MENU CARD */
.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.menu-card {
  background: white;
  border: 1.5px solid var(--color-divider);
  border-radius: var(--radius-md);
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
}
.menu-card.is-sold .menu-fallback { opacity: 0.55; }
.menu-card .stamp-overlay {
  position: absolute;
  top: 8px; left: 8px;
  z-index: 2;
}
.menu-card .stamp-overlay.sold {
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(-12deg);
  z-index: 3;
}
.menu-card .body { padding: 10px 10px 12px; display: flex; flex-direction: column; gap: 4px; }
.menu-card .name { font-weight: 700; font-size: 14px; line-height: 1.25; }
.menu-card .price { font-family: var(--font-mono); font-weight: 700; font-size: 16px; }
.menu-card .add {
  margin-top: 6px;
  height: 38px;
  border-radius: 6px;
  border: 1.5px solid var(--color-ink);
  background: var(--color-accent);
  color: var(--color-ink);
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  box-shadow: 1.5px 1.5px 0 var(--color-ink);
}
.menu-card .add:disabled { opacity: 0.35; background: var(--color-elevated); }
.menu-card .add.in-cart { background: var(--color-success); color: white; }

.cat-tabs {
  display: flex; gap: 6px;
  overflow-x: auto;
  padding: 0 16px 8px;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex: 0 0 auto;
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  background: white;
  border: 1.5px solid var(--color-divider);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.cat-tab.active {
  background: var(--color-ink);
  color: var(--color-accent);
  border-color: var(--color-ink);
}

.popular-strip {
  background: var(--color-ink);
  color: var(--color-bg);
  border-radius: var(--radius-md);
  padding: 12px;
  margin: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  position: relative;
  overflow: hidden;
}
.popular-strip::before {
  content: "🔥";
  position: absolute;
  font-size: 80px;
  right: -10px; top: -20px;
  opacity: 0.15;
}
.popular-strip .rank {
  font-family: var(--font-stencil);
  letter-spacing: 0.04em;
  color: var(--color-accent);
  font-size: 11px;
}
.popular-strip .name {
  font-weight: 800; font-size: 16px;
  margin-top: 2px;
}
.popular-strip .copy {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--color-divider);
  margin-top: 2px;
}

/* qty stepper */
.qty {
  display: inline-flex; align-items: center;
  border: 1.5px solid var(--color-divider);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: white;
}
.qty button {
  width: 36px; height: 36px;
  background: white;
  border: none;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
}
.qty button:disabled { color: var(--color-divider); }
.qty .num {
  width: 36px; text-align: center;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 15px;
}

.cart-line {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 10px;
  padding: 12px 0;
  align-items: center;
}
.cart-line + .cart-line { border-top: 1px dashed var(--color-divider); }
.cart-line .thumb {
  width: 64px; height: 64px;
  border-radius: var(--radius-sm);
  overflow: hidden;
}

/* keep timeline-fill width animation working */
.timeline-fill-0 { width: 0%; }
.timeline-fill-1 { width: 0%; }
.timeline-fill-2 { width: 18%; }
.timeline-fill-3 { width: 43%; }
.timeline-fill-4 { width: 68%; }
.timeline-fill-5 { width: 100%; }

/* receipt summary */
.receipt-line {
  display: flex; justify-content: space-between;
  font-size: 14px; padding: 4px 0;
}
.receipt-line .label { color: var(--color-muted); }
.receipt-line .val { font-family: var(--font-mono); }
.receipt-line.total { font-weight: 800; font-size: 18px; }
.receipt-line.total .val { color: var(--color-ink); }
.receipt-line.discount .val { color: var(--color-success); }

/* SSE bouncing message */
.cooking-copy {
  background: var(--color-surface);
  border: 1.5px dashed var(--color-ink);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  font-size: 15px;
  line-height: 1.5;
}

/* admin order detail */
.detail-block {
  background: white;
  border: 1.5px solid var(--color-divider);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-bottom: 12px;
}
.detail-block h4 {
  margin: 0 0 8px;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-muted);
}
.kv {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 6px 12px;
  font-size: 14px;
}
.kv .k { color: var(--color-muted); }
.kv .v { font-family: var(--font-mono); }

.timeline-events {
  font-family: var(--font-mono);
  font-size: 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.timeline-events .t { color: var(--color-muted); margin-right: 8px; }

.admin-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
}

/* booth map placeholder */
.booth-map {
  margin: 16px;
  aspect-ratio: 4/3;
  background:
    repeating-linear-gradient(45deg,
      rgba(31,27,20,0.06) 0 12px, transparent 12px 24px),
    var(--color-elevated);
  border: 2px dashed var(--color-divider);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  color: var(--color-muted);
}
</style>

<!-- Stamp roughener filter (reuse for all stamps) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="stamp-rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>
  </defs>
</svg>

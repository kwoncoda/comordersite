<!--
=================================================================
  Claude Code Handoff 안내
=================================================================
  파일 구조 (역할 1:1)
  ─────────────────────
  tokens.css            DESIGN.md §3-§9 의 모든 시각 토큰을 CSS 변수로
                        매핑. tailwind.config.js theme.extend로 즉시 이식 가능.
  app.css               컴포넌트별 클래스 (.btn, .menu-card, .dogtag, ...)
                        — 토큰만 참조, 하드코딩 0
  data.js               메뉴 8종 (G10 본명) + PUBG 회복 아이템 매핑 (§10.5)
                        + STATE_LABEL + STAGE_COPY (UX_STRATEGY §7.4)
  components.jsx        Atom/Molecule — Button, Stamp, DogTag, Timeline,
                        StatusChip, Mascot, EmptyState/LoadingState/ErrorState
  screens-customer.jsx  C-1 ~ C-9 (USER_FLOW §2 ~ §3, SCREEN_STRUCTURE §3)
  screens-admin.jsx     A-2 본부 대시보드 (6-col Kanban + G13 영업 토글)
  app.jsx               라우터 state + Tweaks 패널 + 디바이스 프레임

  구현 시 변환 가이드
  ─────────────────────
  React/JSX는 시안용. 실제 구현은 ADR-024 (Express + EJS + Alpine.js):
   - screens-*.jsx → views/customer/*.ejs partial
   - useState → Alpine x-data
   - SSE 자동 진행 (autoAdvance) → /api/orders/:id/stream (EventSource)
   - sessionStorage 단발 모션 (DogTag) → Alpine x-init
   - 가격 계산은 서버 Pattern B (ADR-020) — 클라 노출 X

  주요 결정 인용
  ─────────────────────
  ★ G10 메뉴 본명 유지 (콜라·사이다 이름 리스킨 X) — 시각만 PUBG 매핑
  ★ G11 군복 톤 하이브리드 + "줍기/인벤토리" 라벨
  ★ G12 부스 미니맵 모달 P0 — 우상단 🗺️ 진입
  ★ G13 영업 상태 머신 — CLOSED middleware redirect
  ★ ADR-019 학과 코드 37 매칭 (^\d{2}\d{2}37\d{3}$)
  ★ ADR-020 Pattern B — 서버 자체 계산
  ★ DESIGN §9.6 도그태그 sessionStorage 단발 모션
  ★ DESIGN §4.3 카드 내 형광 옐로 텍스트 금지 (대비 1.31:1)

  PUBG 저작권 가드 (§11 #21)
  ─────────────────────
  PUBG 공식 UI/캐릭터를 직접 복제하지 않고, 군용 인벤토리 메타포만
  자체 디자인으로 구현. 메뉴 일러스트는 이모지 placeholder
  (자산 D-3 미수령 시 ADR-006 fallback).
=================================================================
-->
</head>
